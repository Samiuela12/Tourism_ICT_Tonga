<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TourismICT — Ministry of Tourism ICT Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B2340;--navy2:#0f2d52;--teal:#0D7A6B;--teal2:#0fa38f;--gold:#C8922A;--gold2:#e8a930;
  --red:#C0392B;--green:#1a7a4a;--orange:#d4680a;
  --bg:#F4F6F9;--surface:#ffffff;--surface2:#f8fafc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#1a2332;--text2:#4a5568;--text3:#718096;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow2:0 2px 8px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.08);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);outline:none}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo-badge{background:var(--teal);color:#fff;font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 7px;border-radius:4px;display:inline-block;margin-bottom:8px}
.sidebar-logo h1{color:#fff;font-size:16px;font-weight:600;line-height:1.3}
.sidebar-logo p{color:rgba(255,255,255,.45);font-size:11px;margin-top:2px}
.sidebar-nav{padding:12px 0;flex:1}
.nav-section{padding:8px 18px 4px;color:rgba(255,255,255,.3);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .15s;font-size:13.5px;font-weight:400}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;font-weight:500}
.nav-item .icon{width:18px;height:18px;opacity:.7;flex-shrink:0}
.nav-item.active .icon{opacity:1}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer p{color:rgba(255,255,255,.3);font-size:11px}
.sidebar-footer strong{color:rgba(255,255,255,.55);display:block;font-size:12px}

/* MAIN */
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left h2{font-size:17px;font-weight:600;color:var(--text)}
.topbar-left p{font-size:12px;color:var(--text3)}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal2)}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg);color:var(--text)}
.btn-danger{background:#fee2e2;color:var(--red)}
.btn-danger:hover{background:#fca5a5;color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12px}
.content{padding:24px 28px}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:18px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.teal::before{background:var(--teal)}
.stat-card.gold::before{background:var(--gold)}
.stat-card.navy::before{background:var(--navy)}
.stat-card.green::before{background:var(--green)}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:600;color:var(--text);line-height:1}
.stat-sub{font-size:11.5px;color:var(--text3);margin-top:5px}
.stat-sub span{font-weight:600}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);opacity:.08;font-size:42px}

/* TABLE */
.table-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.table-header h3{font-size:14px;font-weight:600;color:var(--text)}
.table-controls{display:flex;align-items:center;gap:8px}
.search-box{position:relative;display:flex;align-items:center}
.search-box input{padding:6px 10px 6px 30px;border:1px solid var(--border2);border-radius:7px;font-size:12.5px;width:200px;background:var(--bg);color:var(--text)}
.search-box input:focus{border-color:var(--teal);background:#fff}
.search-icon{position:absolute;left:9px;color:var(--text3);font-size:13px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2);border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.mono{font-family:var(--mono);font-size:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#166534}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-orange{background:#fff7ed;color:#9a3412}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-yellow{background:#fefce8;color:#854d0e}

/* PRIORITY */
.pri-high{color:var(--red);font-weight:600}
.pri-medium{color:var(--orange);font-weight:500}
.pri-low{color:var(--text3)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2);animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:600}
.modal-close{width:28px;height:28px;border-radius:6px;background:var(--bg);color:var(--text3);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.modal-close:hover{background:var(--border2)}
.modal-body{padding:20px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:500;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;color:var(--text);background:var(--bg)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--teal);background:#fff}
.form-group textarea{resize:vertical;min-height:72px}

/* DASHBOARD EXTRAS */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.mini-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:16px}
.mini-card h3{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text)}
.ticket-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12.5px}
.ticket-row:last-child{border-bottom:none}
.ticket-title{flex:1;color:var(--text2)}
.network-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.device-chip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--border)}
.device-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.device-dot.online{background:var(--green)}
.device-dot.offline{background:var(--red)}
.device-name{font-size:12px;font-weight:500;color:var(--text)}
.device-ip{font-family:var(--mono);font-size:11px;color:var(--text3)}
.bar-wrap{margin-top:6px}
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.bar-label{width:90px;color:var(--text2)}
.bar-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .5s}
.bar-count{width:24px;text-align:right;color:var(--text3);font-weight:500}

/* ALERTS */
.alert{padding:10px 14px;border-radius:8px;font-size:12.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.alert-warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412}
.alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}

/* NETWORK VIEW */
.network-table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:16px}
.net-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px}
.net-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.net-name{font-size:13px;font-weight:600;color:var(--text)}
.net-type{font-size:11px;color:var(--text3);background:var(--border);padding:1px 6px;border-radius:4px}
.net-ip{font-family:var(--mono);font-size:12px;color:var(--teal);margin-bottom:2px}
.net-loc{font-size:11.5px;color:var(--text3)}

.empty-state{padding:48px 24px;text-align:center;color:var(--text3)}
.empty-state p{font-size:15px;font-weight:500;margin-bottom:6px}
.empty-state span{font-size:13px}

.actions{display:flex;gap:6px}
select.filter{padding:6px 10px;border:1px solid var(--border2);border-radius:7px;font-size:12.5px;background:var(--bg);color:var(--text)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = "http://localhost:5000/api";

// ── ICONS (inline SVG strings as components) ──────────
const Icon = ({ d, size=16, color="currentColor" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d={d}/>
  </svg>
);
const Icons = {
  dashboard: "M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z M9 22V12h6v10",
  assets: "M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z M9 9h6M9 13h6M9 17h4",
  software: "M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18",
  tickets: "M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2",
  network: "M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18M3 9l9 6 9-6",
  plus: "M12 5v14M5 12h14",
  search: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0",
  edit: "M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7 M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z",
  trash: "M3 6h18M8 6V4h8v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6",
  close: "M18 6L6 18M6 6l12 12",
};

// ── UTILS ──────────────────────────────────────────────
const statusBadge = (s) => {
  const map = { Active:"badge-green", Retired:"badge-gray", "Under Repair":"badge-orange", Online:"badge-green", Offline:"badge-red", Open:"badge-blue", "In Progress":"badge-orange", Resolved:"badge-green", Expired:"badge-red" };
  return <span className={`badge ${map[s]||"badge-gray"}`}>{s}</span>;
};
const priorityClass = (p) => ({ High:"pri-high", Medium:"pri-medium", Low:"pri-low" }[p]||"");
const fmtDate = (d) => d ? new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fmtCurrency = (v) => v != null ? `$${Number(v).toLocaleString("en-US",{minimumFractionDigits:2})}` : "—";

// ── MODAL ──────────────────────────────────────────────
function Modal({ title, onClose, onSave, children }) {
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3>{title}</h3>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={onSave}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────
function Dashboard() {
  const [data, setData] = useState(null);
  useEffect(()=>{ fetch(`${API}/dashboard`).then(r=>r.json()).then(setData); },[]);
  if (!data) return <div className="content"><p style={{color:"var(--text3)"}}>Loading dashboard…</p></div>;
  const { assets, software, tickets, network, asset_types, recent_tickets } = data;
  return (
    <div className="content">
      <div className="stats-grid">
        <div className="stat-card teal">
          <div className="stat-label">ICT Assets</div>
          <div className="stat-value">{assets.total}</div>
          <div className="stat-sub"><span style={{color:"var(--teal)"}}>{assets.active}</span> active · <span style={{color:"var(--orange)"}}>{assets.repair}</span> in repair</div>
          <div className="stat-icon">🖥</div>
        </div>
        <div className="stat-card gold">
          <div className="stat-label">Software Licenses</div>
          <div className="stat-value">{software.total}</div>
          <div className="stat-sub"><span style={{color:"var(--orange)"}}>{software.expiring}</span> expiring · <span style={{color:"var(--red)"}}>{software.expired}</span> expired</div>
          <div className="stat-icon">📦</div>
        </div>
        <div className="stat-card navy">
          <div className="stat-label">Helpdesk Tickets</div>
          <div className="stat-value">{tickets.open + tickets.inprogress}</div>
          <div className="stat-sub"><span style={{color:"var(--red)"}}>{tickets.open}</span> open · <span style={{color:"var(--orange)"}}>{tickets.inprogress}</span> in progress</div>
          <div className="stat-icon">🎫</div>
        </div>
        <div className="stat-card green">
          <div className="stat-label">Network Devices</div>
          <div className="stat-value">{network.total}</div>
          <div className="stat-sub"><span style={{color:"var(--green)"}}>{network.online}</span> online · <span style={{color:"var(--red)"}}>{network.offline}</span> offline</div>
          <div className="stat-icon">🌐</div>
        </div>
      </div>

      {software.expired > 0 && <div className="alert alert-warn">⚠ {software.expired} software license(s) have expired — renewal required.</div>}
      {network.offline > 0 && <div className="alert alert-info">ℹ {network.offline} network device(s) currently showing as offline.</div>}

      <div className="dash-grid">
        <div className="mini-card">
          <h3>Assets by Type</h3>
          <div className="bar-wrap">
            {asset_types.map(t=>(
              <div key={t.type} className="bar-item">
                <span className="bar-label">{t.type}</span>
                <div className="bar-track"><div className="bar-fill" style={{width:`${Math.min(100,(t.count/assets.total)*100)}%`}}/></div>
                <span className="bar-count">{t.count}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="mini-card">
          <h3>Recent Tickets</h3>
          {recent_tickets.map(t=>(
            <div key={t.id} className="ticket-row">
              <span className={`badge ${t.status==="Open"?"badge-blue":t.status==="In Progress"?"badge-orange":"badge-green"}`}>{t.status}</span>
              <span className="ticket-title" style={{fontWeight:500}}>{t.title}</span>
              <span className={priorityClass(t.priority)} style={{fontSize:11}}>{t.priority}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="dash-grid">
        <div className="mini-card">
          <h3>ICT Investment Summary</h3>
          <div style={{display:"flex",gap:20,marginTop:4}}>
            <div><div style={{fontSize:11,color:"var(--text3)",marginBottom:3}}>Total Asset Value</div><div style={{fontSize:22,fontWeight:600,color:"var(--teal)"}}>{fmtCurrency(assets.value)}</div></div>
            <div><div style={{fontSize:11,color:"var(--text3)",marginBottom:3}}>Software Spend</div><div style={{fontSize:22,fontWeight:600,color:"var(--gold)"}}>{fmtCurrency(software.cost)}</div></div>
          </div>
        </div>
        <div className="mini-card">
          <h3>Ticket Summary</h3>
          <div style={{display:"flex",gap:12,marginTop:6}}>
            {[["Open",tickets.open,"var(--red)"],["In Progress",tickets.inprogress,"var(--orange)"],["Resolved",tickets.resolved,"var(--green)"]].map(([l,v,c])=>(
              <div key={l} style={{flex:1,textAlign:"center",background:"var(--bg)",padding:"10px 6px",borderRadius:8,border:"1px solid var(--border)"}}>
                <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── ASSETS MODULE ──────────────────────────────────────
const ASSET_FIELDS = {name:"",type:"Desktop",brand:"",model:"",serial_number:"",location:"",assigned_to:"",status:"Active",purchase_date:"",purchase_cost:"",notes:""};
const ASSET_TYPES = ["Desktop","Laptop","Server","Printer","Switch","Router","Access Point","UPS","Camera","Monitor","Tablet","Phone","NAS Storage","Other"];
const ASSET_STATUSES = ["Active","Under Repair","Retired"];

function AssetsModule() {
  const [rows, setRows] = useState([]);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(ASSET_FIELDS);
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");

  const load = useCallback(()=>fetch(`${API}/assets`).then(r=>r.json()).then(setRows),[]);
  useEffect(()=>{load();},[load]);

  const open = (row=null)=>{ setForm(row?{...row}:{...ASSET_FIELDS}); setModal(row?"edit":"add"); };
  const save = async ()=>{
    const method = modal==="edit"?"PUT":"POST";
    const url = modal==="edit"?`${API}/assets/${form.id}`:`${API}/assets`;
    await fetch(url,{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(form)});
    setModal(null); load();
  };
  const del = async (id)=>{ if(!confirm("Delete this asset?"))return; await fetch(`${API}/assets/${id}`,{method:"DELETE"}); load(); };

  const filtered = rows.filter(r=>{
    const q=search.toLowerCase();
    return (filterType==="All"||r.type===filterType) && (filterStatus==="All"||r.status===filterStatus) &&
      (!q||(r.name+r.brand+r.assigned_to+r.serial_number+r.location).toLowerCase().includes(q));
  });

  return (
    <div className="content">
      <div className="table-card">
        <div className="table-header">
          <h3>ICT Asset Register <span style={{color:"var(--text3)",fontWeight:400}}>({filtered.length})</span></h3>
          <div className="table-controls">
            <div className="search-box"><span className="search-icon">⌕</span><input placeholder="Search assets…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
            <select className="filter" value={filterType} onChange={e=>setFilterType(e.target.value)}>
              <option value="All">All Types</option>{ASSET_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
            <select className="filter" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="All">All Status</option>{ASSET_STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>

const SW_FIELDS = {name:"",vendor:"",version:"",license_key:"",license_type:"Subscription",seats:1,installed_on:"",purchase_date:"",expiry_date:"",cost:"",status:"Active",notes:""};
const SW_TYPES = ["Subscription","Perpetual","Open Source","Freeware","Trial"];
const SW_STATUSES = ["Active","Expired","Discontinued","Pending"];

function SoftwareModule() {
  const [rows, setRows] = useState([]);
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(SW_FIELDS);
  const [search, setSearch] = useState("");

  const load = useCallback(()=>fetch(`${API}/software`).then(r=>r.json()).then(setRows),[]);
  useEffect(()=>{load();},[load]);

  const isExpiring = (d) => { if(!d) return false; const diff=(new Date(d)-new Date())/86400000; return diff>0&&diff<=60; };
  const open = (row=null)=>{ setForm(row?{...row}:{...SW_FIELDS}); setModal(row?"edit":"add"); };
  const save = async ()=>{
    const method = modal==="edit"?"PUT":"POST";
    const url = modal==="edit"?`${API}/software/${form.id}`:`${API}/software`;
    await fetch(url,{method,headers:{"Content-Type":"application/json"},body:JSON.stringify(form)});
    setModal(null); load();
  };
  const del = async (id)=>{ if(!confirm("Delete this software record?"))return; await fetch(`${API}/software/${id}`,{method:"DELETE"}); load(); };

  const filtered = rows.filter(r=>!search||(r.name+r.vendor+r.installed_on).toLowerCase().includes(search.toLowerCase()));

  return (

        </div>

          <thead><tr><th>Software</th><th>Vendor</th><th>License Type</th><th>Seats</th><th>Installed On</th><th>Expiry Date</th><th>Annual Cost</th><th>Status</th><th>Actions</th></tr></thead>

            {filtered.length===0 && <tr><td colSpan="9"><div className="empty-state"><p>No software found</p></div></td></tr>}

              <tr key={r.id}>
                <td><div style={{fontWeight:600,color:"var(--text)"}}>{r.name}</div><div style={{fontSize:11,color:"var(--text3)"}}>v{r.version}</div></td>
                <td>{r.vendor||"—"}</td>
                <td><span className="badge badge-blue">{r.license_type}</span></td>
                <td style={{fontWeight:600}}>{r.seats}</td>
                <td style={{fontSize:12,color:"var(--text3)"}}>{r.installed_on||"—"}</td>

                <td style={{fontWeight:500}}>{fmtCurrency(r.cost)}</td>
                <td>{statusBadge(r.status)}</td>
                <td><div className="actions">

        <div className="form-row"><div className="form-group"><label>Version</label><input value={form.version} onChange={e=>setForm({...form,version:e.target.value})}/></div>

        <div className="form-group"><label>Seats / Copies</label><input type="number" min="1" value={form.seats} onChange={e=>setForm({...form,seats:e.target.value})}/></div></div>
        <div className="form-row single"><div className="form-group"><label>Installed On (machines/departments)</label><input value={form.installed_on} onChange={e=>setForm({...form,installed_on:e.target.value})}/></div></div>

                <td>{r.assigned_to||<span style={{color:"var(--text3)"}}>Unassigned</span>}</td>

          <div className="topbar-right">
            <span style={{fontSize:12,color:"var(--text3)"}}>
              {new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"long",year:"numeric"})}
            </span>
          </div>
        </div>
        {page==="dashboard" && <Dashboard/>}
        {page==="assets"    && <AssetsModule/>}
        {page==="software"  && <SoftwareModule/>}
        {page==="tickets"   && <TicketsModule/>}
        {page==="network"   && <NetworkModule/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
